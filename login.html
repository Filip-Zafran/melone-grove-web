<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Melone Grove - Member Login">
    <title>Melone Grove - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
            padding: var(--spacing-md);
        }

        .login-box {
            background: var(--color-white);
            border-radius: 20px;
            padding: var(--spacing-2xl);
            box-shadow: 0 8px 32px rgba(215, 154, 43, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: var(--spacing-sm);
            text-align: center;
            color: var(--color-primary);
        }

        .login-box p {
            text-align: center;
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .form-group input {
            width: 100%;
            padding: var(--spacing-sm);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            font-family: var(--font-sans);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(215, 154, 43, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: var(--spacing-md);
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-btn:hover {
            background: var(--color-primary-dark);
        }

        .demo-credentials {
            background: var(--color-bg-secondary);
            border-left: 4px solid var(--color-accent);
            padding: var(--spacing-md);
            margin-top: var(--spacing-lg);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: var(--spacing-sm);
            color: var(--color-accent);
        }

        .back-link {
            text-align: center;
            margin-top: var(--spacing-lg);
        }

        .back-link a {
            color: var(--color-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Melone Grove</h1>
            <p data-i18n="login_subtitle">Member Login</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="deine@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="demo-credentials">
                <strong>Demo Credentials:</strong>
                Email: demo@example.com<br>
                Password: demo123
            </div>

            <div class="back-link">
                <a href="index.html">← Zurück zur Startseite</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Mock authentication
            if (email && password) {
                localStorage.setItem('meloneGrove_user', JSON.stringify({
                    email: email,
                    name: email.split('@')[0],
                    loggedIn: true
                }));
                window.location.href = 'members.html';
            }
        });

        // Redirect if already logged in
        const user = JSON.parse(localStorage.getItem('meloneGrove_user') || 'null');
        if (user && user.loggedIn) {
            window.location.href = 'members.html';
        }
    </script>
    <script src="i18n.js"></script>
</body>
</html>
